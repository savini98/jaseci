[project]
name = "events-example"
version = "1.0.0"
description = "Minimal event-streaming example for jac-scale"
entry-point = "app.jac"

[plugins.scale.events]
enabled = true
# Omit `url` to use the in-memory LocalEventStream. Set it (or [plugins.scale.database].redis_url)
# to switch to RedisEventStream without code changes.
url = "redis://localhost:6379/0"
consumer_group = "events-example"

[plugins.scale.events.retry]
max_attempts = 3
backoff_seconds = [1, 5, 30]
dead_letter_suffix = ".dlq"

[dependencies.npm]
react = "^18.2.0"
react-dom = "^18.2.0"
react-router-dom = "^6.22.0"
react-error-boundary = "^5.0.0"
react-hook-form = "^7.71.0"
zod = "^4.3.6"
"@hookform/resolvers" = "^5.2.2"

[dependencies.npm.dev]
vite = "^6.4.1"
"@vitejs/plugin-react" = "^4.2.1"
typescript = "^5.3.3"
"@types/react" = "^18.2.0"
"@types/react-dom" = "^18.2.0"
